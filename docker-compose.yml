services:
  esl-scraper-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esl-scraper-dashboard
    ports:
      - "8080:8080"
    environment:
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 8080
      RUN_TESTS_ON_START: 0
    volumes:
      - ./data:/app/data
    restart: unless-stopped
